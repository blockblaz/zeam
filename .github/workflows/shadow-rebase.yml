name: Shadow Branch Auto-Rebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: write

concurrency:
  group: shadow-rebase
  cancel-in-progress: true

jobs:
  rebase-shadow:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Fetch all branches
      run: git fetch origin

    - name: Rebase shadow onto main
      id: rebase
      run: |
        if ! git ls-remote --heads origin shadow | grep -q 'refs/heads/shadow'; then
          echo "⚠️ shadow branch not found on remote — nothing to rebase"
          exit 0
        fi
        echo "🔄 Rebasing origin/shadow onto origin/main..."
        git checkout -B shadow origin/shadow
        if git rebase origin/main; then
          echo "rebase_status=success" >> $GITHUB_OUTPUT
          echo "✅ Rebase succeeded"
        else
          CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null \
            | head -3 | tr '\n' ', ' | sed 's/, $//' || echo "unknown files")
          echo "REBASE_CONFLICTS=$CONFLICTS" >> $GITHUB_ENV
          git rebase --abort || true
          echo "rebase_status=failed" >> $GITHUB_OUTPUT
          echo "❌ Rebase failed: conflicts in $CONFLICTS"
          exit 1
        fi

    - name: Push rebased shadow branch
      if: ${{ steps.rebase.outputs.rebase_status == 'success' }}
      run: |
        git push origin shadow --force-with-lease
        echo "✅ Pushed rebased shadow branch"

    - name: Send Telegram failure notification
      if: failure()
      run: |
        MAIN_SHA="${{ github.sha }}"
        COMMIT_MSG_FULL="${{ github.event.head_commit.message || 'manual trigger' }}"
        COMMIT_MSG="${COMMIT_MSG_FULL%%$'\n'*}"
        REPO_URL="${{ github.server_url }}/${{ github.repository }}"
        RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"

        MESSAGE=$'🚨 Shadow branch rebase FAILED \n\n The `shadow` branch could not be automatically rebased onto `main`.\nManual intervention is required.\n\n'
        MESSAGE+="Cause: conflicts in [${REBASE_CONFLICTS:-unknown}]"$'\n'
        MESSAGE+="Trigger commit: ${MAIN_SHA:0:8}"$'\n'
        MESSAGE+="Message: $COMMIT_MSG"$'\n'
        MESSAGE+="CI Run: $RUN_URL"
        MESSAGE+=$'\n\n@grapebaba'

        PAYLOAD=$(jq -n \
          --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
          --arg text "$MESSAGE" \
          '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" && echo "📱 Telegram failure notification sent" || echo "❌ Failed to send Telegram notification"
