[package]
name = "multisig-glue"
version = "0.1.0"
edition = "2021"

[dependencies]
# leanMultisig prover crates, pinned to the upstream rev carrying the merge/split multi-signature API.
rec_aggregation = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "8fcbd77958a58666e828315de2d6ce7c93297117" }
leansig_wrapper = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "8fcbd77958a58666e828315de2d6ce7c93297117" }
backend = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "8fcbd77958a58666e828315de2d6ce7c93297117" }
rayon = "1"

[lib]
# Built as an rlib so its `#[no_mangle] pub extern "C"` symbols can be funnelled
# through the `zeam-glue` staticlib shim.
crate-type = ["rlib"]
name = "multisig_glue"
